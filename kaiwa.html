<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaiwa — English Expressions</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #f5a623;
    --accent2: #e8875a;
    --text: #e8e8e8;
    --muted: #888;
    --jp: #9ecfff;
    --tag-bg: #2a2a2a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; }

  header {
    padding: 40px 32px 24px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg); z-index: 100;
  }
  .header-top { display: flex; align-items: baseline; gap: 16px; margin-bottom: 16px; }
  h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  h1 span { color: var(--accent); }
  .stats { color: var(--muted); font-size: 14px; }

  .controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  #search {
    flex: 1; min-width: 200px; max-width: 480px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 16px; border-radius: 8px; font-size: 15px;
    outline: none;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  .filter-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); cursor: pointer; font-size: 13px;
    transition: all 0.15s;
  }
  .filter-btn.active, .filter-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }

  .result-count { color: var(--muted); font-size: 13px; margin-left: auto; }

  main { padding: 24px 32px; max-width: 1200px; margin: 0 auto; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px 20px; transition: border-color 0.15s;
    display: flex; flex-direction: column; gap: 10px;
  }
  .card:hover { border-color: #444; }
  .card.hidden { display: none; }

  .card-title {
    font-size: 13px; font-weight: 600; color: var(--accent);
    letter-spacing: 0.3px; line-height: 1.4;
    border-bottom: 1px solid var(--border); padding-bottom: 8px;
  }

  .expr-list { display: flex; flex-direction: column; gap: 4px; }
  .expr {
    font-size: 14px; line-height: 1.6; padding: 2px 0;
  }
  .expr .jp { color: var(--jp); font-size: 12px; }
  .expr.highlight { background: rgba(245,166,35,0.15); border-radius: 4px; padding: 2px 4px; }

  mark { background: var(--accent); color: #000; border-radius: 2px; padding: 0 2px; }

  .empty { text-align: center; padding: 80px 20px; color: var(--muted); }
  .empty h2 { font-size: 20px; margin-bottom: 8px; color: #555; }

  @media (max-width: 600px) {
    header { padding: 24px 16px 16px; }
    main { padding: 16px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>Kaiwa <span>英語表現集</span></h1>
    <span class="stats" id="stats"></span>
  </div>
  <div class="controls">
    <input type="search" id="search" placeholder="表現・単語・日本語で検索..." autocomplete="off">
    <div class="filter-btns">
      <button class="filter-btn active" data-filter="all">全て</button>
      <button class="filter-btn" data-filter="idiom">イディオム</button>
      <button class="filter-btn" data-filter="phrase">フレーズ</button>
      <button class="filter-btn" data-filter="vocab">語彙</button>
    </div>
    <span class="result-count" id="result-count"></span>
  </div>
</header>

<main>
  <div class="grid" id="grid"></div>
  <div class="empty hidden" id="empty">
    <h2>見つかりません</h2>
    <p>別のキーワードで検索してみてください</p>
  </div>
</main>

// Render cards
function renderCards(notes, query) {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const countEl = document.getElementById('result-count');
  grid.innerHTML = '';
  let visibleCount = 0;

  notes.forEach(note => {
    const exprs = note.expressions;
    if (!exprs.length) return;

    // Filter expressions by query
    let filteredExprs = exprs;
    if (query) {
      const q = query.toLowerCase();
      filteredExprs = exprs.filter(e => e.toLowerCase().includes(q));
      if (!filteredExprs.length) return;
    }

    visibleCount++;
    const card = document.createElement('div');
    card.className = 'card';

    const title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = note.title;
    card.appendChild(title);

    const list = document.createElement('div');
    list.className = 'expr-list';

    filteredExprs.forEach(expr => {
      const div = document.createElement('div');
      div.className = 'expr';
      if (query) {
        const re = new RegExp('(' + escapeRe(query) + ')', 'gi');
        div.innerHTML = expr.replace(re, '<mark>$1</mark>');
      } else {
        div.textContent = expr;
      }
      list.appendChild(div);
    });

    card.appendChild(list);
    grid.appendChild(card);
  });

  empty.classList.toggle('hidden', visibleCount > 0);
  countEl.textContent = query ? visibleCount + ' 件のメモがヒット' : '';
}

function escapeRe(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

document.getElementById('stats').textContent = NOTES.length + ' メモ · ' + totalExprs + ' 表現';

renderCards(NOTES, '');

// Search
let timer;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(timer);
  timer = setTimeout(() => renderCards(NOTES, e.target.value.trim()), 150);
});

// Filter buttons (UI only for now — could add logic by content type)
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});
</script>
</body>
